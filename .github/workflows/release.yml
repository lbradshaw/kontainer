name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ─── Create the GitHub Release first (avoids race condition in matrix) ────────
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: true

  # ─── Build binaries and upload to the already-created release ────────────────
  build-binaries:
       name: Build and upload all binaries
       needs: create-release
       runs-on: ubuntu-latest
       permissions:
         contents: write
       steps:
         - uses: actions/checkout@v4
         - uses: actions/setup-go@v5
           with:
             go-version: '1.24'
         - run: |
             GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-w -s" -o kontainer-windows-amd64.exe cmd/kontainer/main.go
             GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-w -s" -o kontainer-linux-amd64 cmd/kontainer/main.go
             GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-w -s" -o kontainer-linux-arm64 cmd/kontainer/main.go
             GOOS=linux GOARCH=arm GOARM=7 CGO_ENABLED=0 go build -ldflags="-w -s" -o kontainer-linux-arm-v7 cmd/kontainer/main.go
             GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-w -s" -o kontainer-darwin-amd64 cmd/kontainer/main.go
             GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-w -s" -o kontainer-darwin-arm64 cmd/kontainer/main.go
         - uses: softprops/action-gh-release@v2
           with:
             files: |
               kontainer-windows-amd64.exe
               kontainer-linux-amd64
               kontainer-linux-arm64
               kontainer-linux-arm-v7
               kontainer-darwin-amd64
               kontainer-darwin-arm64

  # ─── Build and push multi-arch Docker image to ghcr.io ───────────────────────
  build-docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

