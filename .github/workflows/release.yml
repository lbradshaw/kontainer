name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ─── Create the GitHub Release first (avoids race condition in matrix) ────────
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  # ─── Build binaries and upload to the already-created release ────────────────
  build-binaries:
    name: Build ${{ matrix.asset_name }}
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            asset_name: kontainer-windows-amd64.exe
          - goos: linux
            goarch: amd64
            asset_name: kontainer-linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: kontainer-linux-arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            asset_name: kontainer-linux-arm-v7
          - goos: darwin
            goarch: amd64
            asset_name: kontainer-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset_name: kontainer-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-w -s" -o ${{ matrix.asset_name }} cmd/kontainer/main.go

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
          generate_release_notes: true

  # ─── Build and push multi-arch Docker image to ghcr.io ───────────────────────
  build-docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

